server:
  port: ${dkvs.port:8080}

dkvs:
  node-id: ${NODE_ID:node-1}
  host: ${NODE_HOST:localhost}
  port: ${SERVER_PORT:8080}
  seeds: ${SEEDS:localhost:8080}
  replication-factor: ${REPLICATION_FACTOR:3}
  write-quorum: ${WRITE_QUORUM:2}
  read-quorum: ${READ_QUORUM:2}
  data-dir: ${DATA_DIR:./data}
  memtable-flush-threshold: ${MEMTABLE_FLUSH_THRESHOLD:1048576}
  gossip-interval-ms: ${GOSSIP_INTERVAL_MS:1000}
  virtual-nodes: ${VIRTUAL_NODES:150}
  node-down-timeout-ms: ${NODE_DOWN_TIMEOUT_MS:5000}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  metrics:
    tags:
      application: dkvs
      node: ${dkvs.node-id}
