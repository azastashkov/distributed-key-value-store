services:
  node-1:
    build: .
    container_name: dkvs-node-1
    environment:
      NODE_ID: node-1
      NODE_HOST: node-1
      SERVER_PORT: 8080
      SEEDS: "node-1:8080,node-2:8080,node-3:8080,node-4:8080,node-5:8080,node-6:8080,node-7:8080"
      REPLICATION_FACTOR: 3
      WRITE_QUORUM: 2
      READ_QUORUM: 2
      DATA_DIR: /data
    ports:
      - "8080:8080"
    volumes:
      - node1-data:/data

  node-2:
    build: .
    container_name: dkvs-node-2
