global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'dkvs'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'node-1:8080'
          - 'node-2:8080'
          - 'node-3:8080'
          - 'node-4:8080'
          - 'node-5:8080'
          - 'node-6:8080'
          - 'node-7:8080'
